<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX_GOD | GLASS IONIC v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #00ffcc; --bg: #030303; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* خلفية زجاجية متحركة الألوان */
        .glass-background {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(45deg, #000, #051a14, #000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* تأثير الزجاج الشفاف (Glassmorphism) */
        .glass-ui {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        header { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 10px 20px; pointer-events: auto; transition: 0.5s; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 4px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .ionic-clock { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #fff; padding: 10px 15px; }

        .side-actions { position: absolute; left: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { 
            width: 55px; height: 55px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.3s; color: var(--neon);
        }
        .action-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .admin-btn { border-color: #ffaa00 !important; color: #ffaa00 !important; }

        .v-info { position: absolute; bottom: 120px; right: 20px; text-align: right; z-index: 50; }
        .hashtag { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--neon); padding: 5px 12px; display: inline-block; margin-bottom: 5px; }

        /* شريط سفلي زجاجي متطور */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 400px; height: 70px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: border-color 1s ease;
        }

        #upload-trigger { 
            width: 50px; height: 50px; background: var(--neon); color: #000; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 0 20px var(--neon); cursor: pointer;
        }

        #chat-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); display: none; flex-direction: column; padding: 30px; }
        .admin-panel { position: fixed; inset: 0; z-index: 999; background: #000; display: none; flex-direction: column; padding: 30px; }
    </style>
</head>
<body>

    <div class="glass-background"></div>

    <header>
        <div class="brand-box glass-ui"><span class="brand-name">VOX_GOD</span></div>
        <div class="ionic-clock glass-ui" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav class="glass-ui" id="main-nav">
        <i class="fas fa-layer-group text-white/30 text-xl"></i>
        <div id="upload-trigger"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-dots text-[#00ffcc] text-2xl cursor-pointer" onclick="toggleChat()"></i>
    </nav>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-[#00ffcc] tracking-[5px]">VOX_SYNC.v3</h2>
            <i class="fas fa-times text-white/40 text-2xl p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-6 flex gap-3 p-2 glass-ui">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-4 py-3" placeholder="Signal...">
            <button onclick="sendMsg()" class="bg-[#00ffcc] text-black px-8 rounded-xl font-bold text-xs">SEND</button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-[#ffaa00]">GOD_CORE_v3</h2>
            <button onclick="toggleAdmin()" class="bg-white/10 px-6 py-2 rounded-full text-xs">CLOSE</button>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;
        const USR_ID = "VOX-" + Math.floor(Math.random()*9999);

        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);

        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="w-full h-full relative">
                        <video loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="v-info">
                            <div class="hashtag glass-ui">#VOX_IONIC_v3</div>
                        </div>
                        <div class="side-actions">
                            <div class="action-btn glass-ui admin-btn" onclick="checkAdmin()">
                                <i class="fas fa-fingerprint"></i>
                            </div>
                            <div class="action-btn glass-ui" onclick="triggerAd(); db.ref('vox_god_content/${id}/likes').transaction(l=>(l||0)+1)">
                                <i class="fas fa-heart"></i>
                                <span class="text-[10px] mt-1 font-bold">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn glass-ui" onclick="toggleChat()"><i class="fas fa-comment"></i></div>
                            <div class="action-btn glass-ui" onclick="triggerAd(); navigator.share({url:window.location.href})"><i class="fas fa-share"></i></div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `<div class="flex items-center gap-4 p-4 glass-ui">
                    <video class="w-16 h-16 rounded-xl object-cover" src="${vid.url}"></video>
                    <div class="flex-1 text-[10px] font-[Orbitron] opacity-40">${id}</div>
                    <i class="fas fa-trash text-red-500 p-3" onclick="if(confirm('PURGE?')) db.ref('vox_god_content/${id}').remove()"></i>
                </div>`;
            });
            initObserver();
        });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function checkAdmin() { if(prompt("SECURITY KEY:")===ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display==='flex'?'none':'flex'; }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('vox_chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }
        db.ref('vox_chat').limitToLast(25).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="p-4 glass-ui mb-2 border-l-2 border-[#00ffcc]"><span class="text-[9px] text-[#00ffcc] block mb-1">${d.user}</span><p class="text-sm">${d.text}</p></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god_preset",
            sources: ['local', 'camera'],
            showAdvancedOptions: false,
            cropping: false,
            multiple: false,
            defaultSource: "local",
            styles: { palette: { window: "#030303", sourceBg: "#030303", windowBorder: "#00ffcc", tabIcon: "#00ffcc", inactiveTabIcon: "#004433", menuIcons: "#00ffcc", link: "#00ffcc", action: "#00ffcc", inProgress: "#00ffcc", complete: "#20ff88", error: "#ff2222", textDark: "#000000", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const colors = ['#00ffcc', '#00d9ff', '#7000ff', '#ff007f', '#ffaa00'];
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        const clr = colors[Math.floor(Math.random()*colors.length)];
                        document.documentElement.style.setProperty('--neon', clr);
                        document.getElementById('main-nav').style.borderColor = clr;
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
