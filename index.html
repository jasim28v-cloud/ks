<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON_VØID | NEXT GEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #00d9ff; --bg: #00050a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .cyber-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #001520 0%, #000 100%); z-index: -1; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 900;
            color: var(--neon); opacity: 0.04; pointer-events: none; white-space: nowrap; z-index: 10;
        }

        header { position: fixed; top: 25px; right: 25px; z-index: 500; display: flex; align-items: center; gap: 15px; }
        .brand-box { padding: 10px 25px; border-radius: 18px; border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0,217,255,0.3); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 3px; color: var(--neon); text-shadow: 0 0 12px var(--neon); }
        .ionic-clock { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--neon); background: rgba(0,217,255,0.1); padding: 10px 18px; border-radius: 18px; border: 1px solid rgba(0,217,255,0.2); }

        .side-actions { position: absolute; left: 25px; bottom: 135px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { 
            width: 60px; height: 60px; border-radius: 22px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--neon);
        }
        .action-btn:active { transform: scale(0.85); }
        .admin-btn { border-color: #ffaa00 !important; color: #ffaa00 !important; }

        .hashtag { position: absolute; bottom: 45px; right: 25px; font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--neon); background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--neon); z-index: 50; }

        nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 75px; border-radius: 35px; 
            background: rgba(0,5,10,0.9); backdrop-filter: blur(30px); border: 1px solid var(--neon);
            box-shadow: 0 0 30px -5px var(--neon);
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        #chat-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(0,2,5,0.99); display: none; flex-direction: column; padding: 35px; }
        .admin-panel { position: fixed; inset: 0; z-index: 999; background: #000; display: none; flex-direction: column; padding: 45px 25px; }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">NEON_VØID</span></div>
        <div class="ionic-clock" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <i class="fas fa-satellite-dish text-white/20 text-xl"></i>
        <div id="upload-trigger" class="w-16 h-16 bg-[#00d9ff] text-black rounded-[25px] flex items-center justify-center shadow-[0_0_30px_#00d9ff] cursor-pointer">
            <i class="fas fa-plus text-2xl"></i>
        </div>
        <i class="fas fa-comment-alt text-[#00d9ff] text-2xl cursor-pointer" onclick="toggleChat()"></i>
    </nav>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-[#00d9ff] tracking-[5px] text-xl">CYBER_COMM</h2>
            <i class="fas fa-times text-white/40 text-2xl" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-5 pr-3"></div>
        <div class="mt-8 flex gap-4 p-2 bg-white/5 rounded-2xl border border-cyan-500/20">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-5 py-4" placeholder="Transmit data...">
            <button onclick="sendMsg()" class="bg-[#00d9ff] text-black px-10 rounded-xl font-black">SEND</button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-12">
            <h2 class="font-[Orbitron] text-[#ffaa00] text-2xl">CORE_OVERRIDE</h2>
            <button onclick="toggleAdmin()" class="bg-white/10 px-10 py-3 rounded-full text-xs">DISCONNECT</button>
        </div>
        <div id="admin-list" class="space-y-5 overflow-y-auto"></div>
    </div>

    <script>
        const ADMIN_PASS = "2026"; // كلمة السر الجديدة لعام 2026
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;
        const USR_ID = "VOID-" + Math.floor(Math.random()*9999);

        // إعداد قاعدة بيانات جديدة لموقعك الجديد
        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);

        db.ref('neon_void_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="watermark">NEON VØID</div>
                        <video loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="hashtag">#NEXT_GEN_2026</div>
                        <div class="side-actions">
                            <div class="action-btn admin-btn" onclick="checkAdmin()">
                                <i class="fas fa-key"></i>
                                <span class="text-[8px] mt-1">CORE</span>
                            </div>
                            <div class="action-btn" onclick="triggerAd(); db.ref('neon_void_content/${id}/likes').transaction(l=>(l||0)+1)">
                                <i class="fas fa-atom"></i>
                                <span class="text-[11px] mt-1 font-bold">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()"><i class="fas fa-wave-square"></i></div>
                            <div class="action-btn" onclick="triggerAd(); navigator.share({url:window.location.href})"><i class="fas fa-expand-arrows-alt"></i></div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `<div class="flex items-center gap-5 p-5 bg-white/5 rounded-[25px] border border-cyan-500/10">
                    <video class="w-20 h-20 rounded-2xl object-cover" src="${vid.url}"></video>
                    <div class="flex-1 text-[10px] font-[Orbitron] opacity-30">${id}</div>
                    <i class="fas fa-power-off text-red-500 p-4 bg-red-500/10 rounded-full" onclick="if(confirm('PURGE DATA?')) db.ref('neon_void_content/${id}').remove()"></i>
                </div>`;
            });
            initObserver();
        });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function checkAdmin() { if(prompt("ACCESS CODE:")===ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display==='flex'?'none':'flex'; }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('neon_chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }
        db.ref('neon_chat').limitToLast(25).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="p-5 bg-cyan-500/5 border border-cyan-500/10 rounded-3xl">
                    <span class="text-[9px] text-[#00d9ff] font-[Orbitron] block mb-2 opacity-50">${d.user}</span>
                    <p class="text-sm line-height-6">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            styles: { palette: { window: "#00050a", sourceBg: "#00050a", windowBorder: "#00d9ff", tabIcon: "#00d9ff", inactiveTabIcon: "#003344", menuIcons: "#00d9ff", link: "#00d9ff", action: "#00d9ff", inProgress: "#00d9ff", complete: "#20ff88", error: "#ff2222", textDark: "#000000", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('neon_void_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
