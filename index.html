<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX ULTRA | THE IONIC PRESTIGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Noto+Sans+Arabic:wght@100;400;900&display=swap');
        
        :root {
            --ionic-glow: #00d4ff;
            --prestige-bg: #030405;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--prestige-bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #001a1d 0%, transparent 40%),
                              radial-gradient(circle at 100% 100%, #1a001d 0%, transparent 40%);
        }

        /* الهيدر الأيوني */
        header {
            position: sticky; top: 0; z-index: 1000;
            padding: 25px 50px;
            background: rgba(3, 4, 5, 0.7);
            backdrop-filter: blur(30px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand { font-family: 'Plus Jakarta Sans'; font-weight: 800; font-size: 22px; letter-spacing: 2px; }
        .brand span { color: var(--ionic-glow); text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }

        /* حاوية الفيديوهات - شبكة ذكية */
        .main-stage {
            max-width: 1600px; margin: 50px auto; padding: 0 40px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 40px;
        }

        .ionic-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
        }

        .ionic-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--ionic-glow);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .video-canvas {
            aspect-ratio: 16/9; width: 100%; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .video-canvas video { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        .card-details { padding: 25px; }
        .card-id { font-family: 'Plus Jakarta Sans'; font-size: 10px; opacity: 0.3; letter-spacing: 3px; }

        /* المشغل الألترا (Full Overlay) */
        .v-player-overlay {
            position: fixed; inset: 0; background: rgba(2, 2, 3, 0.98);
            z-index: 5000; display: none; overflow-y: auto;
        }

        .player-wrapper {
            max-width: 1200px; margin: 60px auto; padding: 0 20px;
        }

        .screen {
            border-radius: 30px; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.05); background: #000;
        }

        .control-panel {
            margin-top: 40px; display: flex; gap: 40px;
        }

        .glass-btn {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px 30px; border-radius: 18px; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--ionic-glow); color: var(--ionic-glow); }

        /* زر الرفع الأنيق */
        .fab-ionic {
            position: fixed; bottom: 40px; left: 40px;
            width: 70px; height: 70px; background: #fff; color: #000;
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: 0.4s; z-index: 2000;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }
        .fab-ionic:hover { border-radius: 50%; background: var(--ionic-glow); transform: rotate(90deg); }

        footer { text-align: center; padding: 100px 20px; color: #222; font-family: 'Plus Jakarta Sans'; font-size: 12px; letter-spacing: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">VORTEX_<span>ULTRA</span></div>
        <div class="flex items-center gap-8">
            <div id="status" class="flex items-center gap-2 text-[10px] opacity-40 font-bold tracking-widest">
                <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span> SYSTEM_PRESTIGE_ON
            </div>
            <div id="clock" class="font-[Plus Jakarta Sans] text-sm opacity-60">00:00:00</div>
        </div>
    </header>

    <main class="main-stage" id="feed"></main>

    <div id="playerUI" class="v-player-overlay">
        <div class="player-wrapper">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closeVideo()" class="text-white/30 hover:text-white transition"><i class="fas fa-arrow-right ml-2"></i> ESCAPE_VIEW</button>
                <div class="brand scale-75">VORTEX_<span>PRESTIGE</span></div>
            </div>

            <div class="screen">
                <video id="v-main" controls class="w-full h-full"></video>
            </div>

            <div class="control-panel flex-col md:flex-row">
                <div class="flex-1">
                    <h1 id="v-title" class="text-4xl font-black mb-4">SESSION_LOAD...</h1>
                    <p class="opacity-40 text-sm leading-relaxed mb-8">نظام البث الأيوني المتقدم. تم تشفير البيانات وتحسينها للعرض السينمائي 2026.</p>
                    
                    <div class="flex gap-4">
                        <div class="glass-btn" onclick="likeVideo()">
                            <i class="fas fa-heart text-pink-500"></i>
                            <span id="v-likes" class="font-bold">0</span>
                        </div>
                        <div class="glass-btn" onclick="shareVideo()">
                            <i class="fas fa-share-alt"></i>
                            <span>SHARE</span>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-[400px]">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> المناقشة
                    </h3>
                    <div id="v-comments" class="space-y-4 max-h-[300px] overflow-y-auto mb-4 pr-2"></div>
                    <div class="flex gap-2">
                        <input type="text" id="c-input" class="bg-white/5 border border-white/10 rounded-xl p-4 flex-1 outline-none text-sm" placeholder="أضف بصمتك...">
                        <button onclick="sendComment()" class="bg-white text-black px-6 rounded-xl font-bold"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-ionic" id="upBtn"><i class="fas fa-plus"></i></div>

    <footer>VORTEX_ULTRA_SYSTEM_2026_X</footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "ELITE-" + Math.floor(Math.random()*999);
        let activeID = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب البيانات بتصميم البطاقات الأيوني
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            feed.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'ionic-card';
                card.onclick = () => openVideo(id, v);
                card.innerHTML = `
                    <div class="video-canvas">
                        <video src="${v.url}#t=1" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                    </div>
                    <div class="card-details">
                        <div class="card-id mb-2">SEQUENCE // ${id.substring(1,9)}</div>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-lg">PRESTIGE_FEED</span>
                            <span class="text-cyan-400 font-bold"><i class="fas fa-bolt"></i> ${v.likes || 0}</span>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        });

        function openVideo(id, v) {
            activeID = id;
            document.getElementById('v-main').src = v.url;
            document.getElementById('v-likes').innerText = v.likes || 0;
            document.getElementById('v-title').innerText = "VORTEX_ULTRA_" + id.substring(1,7);
            document.getElementById('playerUI').style.display = 'block';
            loadComments(id);
        }

        function closeVideo() {
            document.getElementById('playerUI').style.display = 'none';
            document.getElementById('v-main').pause();
        }

        function likeVideo() {
            db.ref(`videos/${activeID}/likes`).transaction(l => (l || 0) + 1);
            window.open("https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90", "_blank");
        }

        function sendComment() {
            const inp = document.getElementById('c-input');
            if(inp.value.trim()) {
                db.ref(`comments/${activeID}`).push({ u: USR_ID, t: inp.value });
                inp.value = '';
            }
        }

        function loadComments(id) {
            db.ref(`comments/${id}`).on('value', s => {
                const box = document.getElementById('v-comments');
                box.innerHTML = '';
                s.forEach(m => {
                    const d = m.val();
                    box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r border-white/10">
                        <div class="text-[9px] text-cyan-400 font-bold mb-1 opacity-50">${d.u}</div>
                        <div class="text-sm">${d.t}</div>
                    </div>`;
                });
            });
        }

        function shareVideo() { window.open("https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d", "_blank"); }

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dk5kas1gc", uploadPreset: "go_kck"
        }, (err, res) => {
            if(!err && res.event === "success") {
                db.ref('videos').push({url: res.info.secure_url, likes: 0});
                alert("تم رفع المحتوى بنجاح!");
            }
        });
        document.getElementById('upBtn').onclick = () => widget.open();
    </script>
</body>
</html>
